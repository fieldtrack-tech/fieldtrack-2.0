server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

metrics_generator:
  registry:
    external_labels:
      source: tempo
  processor:
    service_graphs:
      dimensions:
        - http.method
        - http.route

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
