global:
  resolve_timeout: 5m
  # Default SMTP settings — override with environment variables in production.
  # Set ALERTMANAGER_SMTP_FROM, ALERTMANAGER_SMTP_HOST, ALERTMANAGER_SMTP_USER,
  # ALERTMANAGER_SMTP_PASSWORD in infra/.env.monitoring before deploying.
  smtp_from: "${ALERTMANAGER_SMTP_FROM}"
  smtp_smarthost: "${ALERTMANAGER_SMTP_HOST}:587"
  smtp_auth_username: "${ALERTMANAGER_SMTP_USER}"
  smtp_auth_password: "${ALERTMANAGER_SMTP_PASSWORD}"
  smtp_require_tls: true

# Group related alerts and suppress repeated notifications.
route:
  group_by: ["alertname", "severity"]
  group_wait: 30s        # Wait before sending initial notification
  group_interval: 5m     # Minimum time between grouped notifications
  repeat_interval: 4h    # Resend if alert is still firing after 4 hours
  receiver: "ops-email"

  # Critical alerts bypass the 4-hour repeat interval — resend every hour.
  routes:
    - matchers:
        - severity="critical"
      receiver: "ops-email"
      repeat_interval: 1h

receivers:
  - name: "ops-email"
    email_configs:
      - to: "${ALERTMANAGER_NOTIFY_EMAIL}"
        send_resolved: true
        headers:
          subject: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }} ({{ .Alerts.Firing | len }}){{ end }}] FieldTrack — {{ .CommonAnnotations.summary }}'
        html: |
          {{ range .Alerts }}
          <b>Alert:</b> {{ .Annotations.summary }}<br/>
          <b>Severity:</b> {{ .Labels.severity }}<br/>
          <b>Description:</b> {{ .Annotations.description }}<br/>
          <b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}<br/>
          {{ if .EndsAt }}<b>Resolved:</b> {{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}<br/>{{ end }}
          <hr/>
          {{ end }}

# Silence rules: suppress expected noise during planned maintenance.
# Add entries here before a deployment rather than disabling alerting entirely.
inhibit_rules:
  # If the backend container is down (DeploymentFailure), suppress the
  # dependent high-latency and error-rate alerts — they are all downstream
  # effects of the same root cause and would produce redundant notifications.
  - source_matchers:
      - alertname="DeploymentFailure"
    target_matchers:
      - alertname=~"FieldTrackHighErrorRate|FieldTrackHighLatency|FieldTrackAvgLatencyHigh|ReadinessCheckFailing"
    equal: ["job"]
