name: Auto Merge PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == false

    steps:
      - uses: actions/checkout@v4

      - name: Validate PR scope
        if: >
          github.event.pull_request.base.ref != 'master' ||
          github.event.pull_request.head.ref != 'beta'
        run: exit 0

      - name: Skip draft PR
        if: github.event.pull_request.draft == true
        run: exit 0

      - name: Wait until all required checks succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}

          for i in {1..20}; do
            FAILING=$(gh pr view "$PR" --json statusCheckRollup -q '
              [.statusCheckRollup[]
              | select(
                  (.name | contains("Auto Merge") | not) and
                  .conclusion != null and
                  .conclusion != "SUCCESS"
                )]
              | length
            ')

            PENDING=$(gh pr view "$PR" --json statusCheckRollup -q '
              [.statusCheckRollup[]
              | select(
                  (.name | contains("Auto Merge") | not) and
                  .conclusion == null
                )]
              | length
            ')

            echo "Failing: $FAILING | Pending: $PENDING"

            if [ "$FAILING" = "0" ] && [ "$PENDING" = "0" ]; then
              echo "All external checks passed"
              break
            fi

            if [ "$i" = "20" ]; then
              echo "Timeout waiting for checks"
              exit 1
            fi

            sleep 10
          done

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          SHA=${{ github.event.pull_request.head.sha }}

          gh pr merge "$PR" \
            --squash \
            --match-head-commit "$SHA" \
            --delete-branch=false