name: Sync beta ← master

on:
  push:
    branches:
      - master
  # Fallback: fires directly when the auto-merge workflow completes.
  # Handles the case where GitHub blocks push-triggered workflows from
  # Actions-initiated commits (GITHUB_TOKEN restriction).
  workflow_run:
    workflows: ["Auto Merge PR"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: sync-beta
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync beta branch
        run: |
          git fetch origin
          git checkout beta
          git merge origin/master --no-edit
          git push origin beta

          echo "beta synced with master via merge"
          git log -1 --oneline